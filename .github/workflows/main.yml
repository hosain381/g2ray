name: Definitive Xray Test
on: workflow_dispatch

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Xray
        run: |
          # دانلود فایل zip
          wget -O /tmp/xray.zip "https://github.com/hosain381/aio-downloader/raw/refs/heads/main/direct/Xray-linux-64.zip_ezqld.zip"
          
          # استخراج فایل‌ها
          unzip /tmp/xray.zip -d /tmp/xray_extracted

          # نمایش محتوای استخراج‌شده برای عیب‌یابی (اختیاری ولی مفید)
          echo "=== محتوای پوشه استخراج‌شده ==="
          find /tmp/xray_extracted -type f
          
          # پیدا کردن فایل اجرایی xray (بدون توجه به نام دقیق یا مسیر)
          XRAY_BIN=$(find /tmp/xray_extracted -type f -name "xray" -o -name "xray_*" | head -n 1)
          
          if [ -z "$XRAY_BIN" ]; then
            echo "::error::فایل اجرایی xray در محتوای zip پیدا نشد"
            exit 1
          fi
          
          echo "فایل اجرایی پیدا شد: $XRAY_BIN"
          
          # کپی به مسیر استاندارد و تنظیم مجوز اجرا
          sudo cp "$XRAY_BIN" /usr/local/bin/xray
          sudo chmod +x /usr/local/bin/xray

      - name: Save Xray version to file
        run: /usr/local/bin/xray version > xray_version.txt 2>&1

      - name: Commit and push version file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add xray_version.txt
          git commit -m "Add Xray version proof" || echo "No changes to commit"
          git push
