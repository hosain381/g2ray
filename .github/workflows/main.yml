name: 'setup'
on:
  workflow_dispatch:
jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install v2ray
        run: |
          curl -L -o v2ray.zip https://github.com/v2fly/v2ray-core/releases/latest/download/v2ray-linux-64.zip
          unzip v2ray.zip -d v2ray
          rm v2ray.zip
          chmod +x v2ray/v2ray v2ray/v2ctl
          sudo mv v2ray /usr/local/
          sudo ln -s /usr/local/v2ray/v2ray /usr/local/bin/v2ray
          sudo ln -s /usr/local/v2ray/v2ctl /usr/local/bin/v2ctl
      - name: generate config
        run: |
          UUID=$(cat /proc/sys/kernel/random/uuid)
          mkdir -p config
          cat > config/config.json <<EOF
          {
            "inbounds": [{
              "port": 443,
              "protocol": "vless",
              "settings": {
                "clients": [{"id": "$UUID"}],
                "decryption": "none"
              },
              "streamSettings": {
                "network": "ws",
                "security": "tls",
                "tlsSettings": { "allowInsecure": false },
                "wsSettings": { "path": "/ray" }
              }
            }],
            "outbounds": [{"protocol": "freedom"}]
          }
          EOF
          echo "vless://$UUID@localhost:443?encryption=none&security=tls&sni=www.bing.com&type=ws&host=www.bing.com&path=%2Fray#G2Ray_VLESS" > config/link.txt
      - name: upload config
        uses: actions/upload-artifact@v4
        with:
          name: v2ray-config
          path: config/
