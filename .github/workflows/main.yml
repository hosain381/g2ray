name: Install Xray and Generate VLESS Config
on: workflow_dispatch
jobs:
  run:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Xray
        run: |
          cd .devcontainer
          bash install.sh
          sudo cp /usr/local/bin/xray /usr/local/bin/xray
          sudo mkdir -p /usr/local/etc/xray
          sudo cp config.json /usr/local/etc/xray/config.json
      - name: Run Xray and get VLESS link
        run: |
          sudo /usr/local/bin/xray run -c /usr/local/etc/xray/config.json &
          sleep 10
          curl -s -o /tmp/xray-output.json http://127.0.0.1:8080/config
          cat /tmp/xray-output.json | jq -r '.outbounds[0].settings.vnext[0].users[0].id' > uuid.txt
          echo "vless://$(cat uuid.txt)@$(curl -s ifconfig.me):443?security=reality&sni=github.com&type=tcp" > vless_link.txt
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vless_link.txt
          git commit -m "Add VLESS config" || echo "No changes"
          git push
