name: Definitive Xray Test
on: workflow_dispatch

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Xray
        run: |
          # دانلود فایل زیپ (از منبع رسمی یا جایگزین)
          wget -O /tmp/xray.zip "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip"
          
          # استخراج فایل‌ها
          unzip /tmp/xray.zip -d /tmp/xray_extracted

          # نمایش محتوای استخراج‌شده برای عیب‌یابی
          echo "=== محتوای پوشه استخراج‌شده ==="
          find /tmp/xray_extracted -type f -printf "%p\n"
          
          # جستجوی انعطاف‌پذیرتر برای فایل اجرایی xray
          XRAY_BIN=$(find /tmp/xray_extracted -type f \( -name "xray" -o -name "xray_*" -o -name "xray-linux-64" \) | head -n 1)
          
          if [ -z "$XRAY_BIN" ]; then
            echo "::error::فایل اجرایی xray در محتوای zip پیدا نشد"
            exit 1
          fi
          
          echo "فایل اجرایی پیدا شد: $XRAY_BIN"
          
          # کپی به مسیر استاندارد و تنظیم مجوز اجرا
          sudo cp "$XRAY_BIN" /usr/local/bin/xray
          sudo chmod +x /usr/local/bin/xray

      - name: Save Xray version to file
        run: /usr/local/bin/xray version > xray_version.txt 2>&1

      - name: Commit and push version file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add xray_version.txt
          git commit -m "Add Xray version proof" || echo "No changes to commit"
          git push
