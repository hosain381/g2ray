name: Generate and Commit VLESS Config
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Xray and run to get config
        run: |
          # دانلود و نصب Xray
          wget -q -O /tmp/xray.zip https://github.com/XTLS/Xray-core/releases/download/v26.3.27/Xray-linux-64.zip
          unzip -q /tmp/xray.zip -d /tmp/xray
          sudo cp /tmp/xray/xray /usr/local/bin/xray
          sudo chmod +x /usr/local/bin/xray

          # کپی config.json پروژه
          sudo mkdir -p /usr/local/etc/xray
          sudo cp .devcontainer/config.json /usr/local/etc/xray/config.json

          # اجرای Xray با تایم‌اوت ۲۰ ثانیه و گرفتن خروجی
          sudo timeout 20 /usr/local/bin/xray run -c /usr/local/etc/xray/config.json 2>&1 | tee /tmp/xray-output.log &
          sleep 10

          # استخراج لینک VLESS از خروجی (اگه تولید شده باشه)
          grep -Eo 'vless://[^ ]+' /tmp/xray-output.log > vless_link.txt || echo "Link not found" > vless_link.txt

      - name: Commit and push the config file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vless_link.txt
          git commit -m "Add VLESS config link" || echo "No changes to commit"
          git push
