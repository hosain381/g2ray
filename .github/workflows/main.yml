name: Generate VLESS Config
on:
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Run G2Ray setup
        shell: bash
        run: |
          chmod +x setup.sh
          ./setup.sh 2>&1 | tee output.log
      - uses: actions/upload-artifact@v4
        with:
          name: my-vless-config
          path: output.log
