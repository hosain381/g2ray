name: Final Xray Test
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download and Install Xray
        run: |
          wget -q "https://github.com/XTLS/Xray-core/releases/download/v1.8.23/Xray-linux-64.zip" -O /tmp/xray.zip
          unzip -q /tmp/xray.zip -d /tmp/xray
          sudo cp /tmp/xray/xray /usr/local/bin/xray
          sudo chmod +x /usr/local/bin/xray

      - name: Run Xray and Capture Output
        run: |
          sudo mkdir -p /usr/local/etc/xray
          sudo cp .devcontainer/config.json /usr/local/etc/xray/config.json
          sudo /usr/local/bin/xray run -c /usr/local/etc/xray/config.json 2>&1 | tee /tmp/xray.log &
          sleep 15
          sudo pkill xray || true

      - name: Save Xray Log as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xray-log
          path: /tmp/xray.log
