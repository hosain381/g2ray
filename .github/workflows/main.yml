name: Fetch and Commit Working VLESS Config
on:
  workflow_dispatch:
jobs:
  update-config:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download latest VLESS configs
        run: |
          curl -s -L -o /tmp/sub_merge.txt "https://raw.githubusercontent.com/mahdibland/V2RayAggregator/master/sub/sub_merge.txt"
          grep -m 1 'vless://' /tmp/sub_merge.txt > vless_link.txt || echo "No active VLESS found" > vless_link.txt

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vless_link.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update VLESS config link" && git push)
