name: Web Shell (with Codespace control)

on:
  workflow_dispatch:
  push:
    paths:
      - 'command.sh'

permissions:
  contents: write

jobs:
  execute:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: اجرای command.sh
        env:
          GH_PAT: ${{ secrets.GH_PAT }}   # <-- تزریق امن توکن
        run: |
          chmod +x command.sh
          ./command.sh > output.txt 2>&1
          cat output.txt

      - name: ذخیره artifact و push
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shell-output
          path: output.txt

      - name: commit و push خروجی
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output.txt
          git commit -m "خروجی اجرای command.sh" || echo "بدون تغییر"
          git push || echo "push ناموفق - artifact موجود است"
