name: Web Shell (File-Based)

on:
  push:
    paths:
      - 'command.sh'

permissions:
  contents: write

jobs:
  execute:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: اجرای فرمان از فایل
        run: |
          echo "============== محتوای command.sh ==============" | tee /tmp/full_log.txt
          cat command.sh | tee -a /tmp/full_log.txt
          echo "============== خروجی =========================" | tee -a /tmp/full_log.txt
          bash command.sh 2>&1 | tee -a /tmp/full_log.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "Exit code: $EXIT_CODE" | tee -a /tmp/full_log.txt
          cp /tmp/full_log.txt ./output.txt

      - name: ذخیره خروجی در مخزن
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output.txt
          git commit -m "خروجی اجرای command.sh" || echo "بدون تغییر"
          git push

      - name: آپلود artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shell-output
          path: /tmp/full_log.txt
