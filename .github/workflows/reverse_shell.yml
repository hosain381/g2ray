name: Web Shell (Reliable)

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'دستور bash را وارد کنید'
        required: true
        type: string
        default: 'echo "سلام! رانر فعال است." && date'

permissions:
  contents: write

jobs:
  execute:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: اجرای دستور و ذخیره لاک کامل
        run: |
          echo "============== دستور دریافتی ==============" | tee /tmp/full_log.txt
          echo "${{ github.event.inputs.command }}" | tee -a /tmp/full_log.txt
          echo "============== خروجی =====================" | tee -a /tmp/full_log.txt
          bash -c "${{ github.event.inputs.command }}" 2>&1 | tee -a /tmp/full_log.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "Exit code: $EXIT_CODE" | tee -a /tmp/full_log.txt
          # کپی فایل لاک به مسیر workspace (برای commit)
          cp /tmp/full_log.txt ./output.txt

      - name: تلاش برای commit و push خروجی
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output.txt
          git commit -m "پاسخ: ${{ github.event.inputs.command }}" || echo "No changes to commit"
          git push || echo "⚠️ Push failed (احتمالاً نیاز به PAT دارد)"

      - name: آپلود لاک به عنوان artifact (همیشه در دسترس)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-execution-log
          path: /tmp/full_log.txt
