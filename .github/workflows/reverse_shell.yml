name: Web Shell

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'دستور bash را وارد کنید'
        required: true
        type: string
        default: 'echo "سلام! رانر فعال است." && date'

permissions:
  contents: write

jobs:
  execute:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: اجرای دستور
        run: |
          echo "=== فرمان دریافتی ==="
          echo "${{ github.event.inputs.command }}"
          echo "=== خروجی ==="
          bash -c "${{ github.event.inputs.command }}" > output.txt 2>&1
          echo "Exit code: $?" >> output.txt

      - name: ذخیره خروجی در مخزن
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output.txt
          git commit -m "پاسخ: ${{ github.event.inputs.command }}" || echo "بدون تغییر"
          git push
