name: Remote Command Executor

on:
  workflow_dispatch:
  push:
    paths:
      - 'command.txt'    # تنها زمانی اجرا شود که فایل command.txt تغییر کند

permissions:
  contents: write

jobs:
  execute:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Run command from file
        run: |
          if [ -f command.txt ]; then
            echo "Executing command..."
            bash command.txt > output.txt 2>&1
            echo "Exit code: $?" >> output.txt
          else
            echo "No command file found." > output.txt
          fi

      - name: Commit and push output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output.txt
          git commit -m "Update output" || echo "No changes"
          git push
