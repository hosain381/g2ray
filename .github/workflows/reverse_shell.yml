name: File-Based Web Shell

on:
  push:
    paths:
      - 'command.sh'       # فقط وقتی command.sh تغییر کند اجرا شود

permissions:
  contents: write

jobs:
  execute:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: اجرای command.sh
        run: |
          echo "============== محتوای command.sh ==============" | tee /tmp/full_log.txt
          cat command.sh | tee -a /tmp/full_log.txt
          echo "============== خروجی =========================" | tee -a /tmp/full_log.txt
          
          chmod +x command.sh
          ./command.sh 2>&1 | tee -a /tmp/full_log.txt
          echo "Exit code: $?" | tee -a /tmp/full_log.txt
          
          cp /tmp/full_log.txt ./output.txt

      - name: آپلود خروجی به artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shell-output
          path: /tmp/full_log.txt

      - name: commit و push خروجی
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output.txt
          git commit -m "خروجی اجرای command.sh" || echo "بدون تغییر"
          git push || echo "⚠️ push ناموفق - اما artifact موجود است"
